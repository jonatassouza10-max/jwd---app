<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWD Contadores - Painel do Cliente</title>
    <style>
        :root { --primary: #0F2B4C; --secondary: #1F4E79; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #eef2f5; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .screen { display: none; padding: 25px; animation: fadeIn 0.4s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .logo-img { max-width: 180px; display: block; margin: 20px auto; background: white; padding: 10px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 15px; font-size: 16px; }
        button { width: 100%; padding: 16px; background: var(--secondary); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--primary); }
        .card { background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px solid #edf2f7; margin-bottom: 15px; text-align: center; }
        .nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; display: none; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="auth-screen" class="screen active">
        <img src="https://i.postimg.cc/8z0mXn3N/image-b99160.png" class="logo-img">
        <h2 id="auth-title">Criar Conta JWD</h2>
        <div id="cadastro-extra">
            <input type="text" id="reg-nome" placeholder="Seu Nome Completo">
            <input type="text" id="reg-cnpj" placeholder="Seu CNPJ">
        </div>
        <input type="email" id="auth-email" placeholder="Seu E-mail">
        <input type="password" id="auth-senha" placeholder="Sua Senha (min. 6 dígitos)">
        <button onclick="handleAuth()">CONFIRMAR ACESSO</button>
        <p onclick="toggleModo()" id="toggle-text" style="text-align:center; margin-top:20px; color:var(--secondary); cursor:pointer; font-size:14px;">Já tenho cadastro? Entrar agora</p>
    </div>

    <div id="home-screen" class="screen">
        <header style="background:var(--primary); color:white; padding:30px 20px; margin:-25px -25px 25px; border-radius:0 0 25px 25px; text-align:center;">
            <img src="https://i.postimg.cc/8z0mXn3N/image-b99160.png" class="logo-img" style="max-width:120px; margin-top:0;">
            <h3 id="user-name">Bem-vindo!</h3>
        </header>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div class="card">📅<br><strong>DAS MEI</strong></div>
            <div class="card">🤖<br><strong>IA Reforma</strong></div>
        </div>
        <div class="card" style="margin-top:10px;">📊<br><strong>Simulador Tributário</strong></div>
    </div>

    <div class="nav" id="main-nav">
        <div onclick="location.reload()">🏠 Home</div>
        <div onclick="alert('Funcionalidade em desenvolvimento')">📁 Documentos</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApe6MwWuHHxbuIjC31c9KQ4XLTrDGDZwg",
        authDomain: "jwd-contadores-associados.firebaseapp.com",
        projectId: "jwd-contadores-associados",
        storageBucket: "jwd-contadores-associados.firebasestorage.app",
        messagingSenderId: "64194886199",
        appId: "1:64194886199:web:4de4b64bc76379b5d75db2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isLogin = false;
    window.toggleModo = () => {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? 'Entrar no Painel' : 'Criar Conta JWD';
        document.getElementById('cadastro-extra').style.display = isLogin ? 'none' : 'block';
        document.getElementById('toggle-text').innerText = isLogin ? 'Não tem conta? Cadastrar' : 'Já tenho cadastro? Entrar agora';
    };

    window.handleAuth = async () => {
        const email = document.getElementById('auth-email').value;
        const senha = document.getElementById('auth-senha').value;
        try {
            if(isLogin) {
                await signInWithEmailAndPassword(auth, email, senha);
            } else {
                const cred = await createUserWithEmailAndPassword(auth, email, senha);
                await setDoc(doc(db, "clientes", cred.user.uid), {
                    nome: document.getElementById('reg-nome').value,
                    cnpj: document.getElementById('reg-cnpj').value
                });
            }
        } catch (e) {
            alert("Erro: " + e.message + "\nLembre-se de adicionar seu domínio no console do Firebase!");
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            const userDoc = await getDoc(doc(db, "clientes", user.uid));
            if(userDoc.exists()) {
                document.getElementById('user-name').innerText = "Olá, " + userDoc.data().nome;
            }
            document.getElementById('auth-screen').classList.remove('active');
            document.getElementById('home-screen').classList.add('active');
            document.getElementById('main-nav').style.display = 'flex';
        }
    });
</script>
</body>
</html>
